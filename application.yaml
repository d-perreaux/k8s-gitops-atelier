apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atelier-final-k8s
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/d-perreaux/k8s-gitops-atelier.git'
    targetRevision: HEAD
    path: './'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: rendu
  syncPolicy:
    automated:
      prune: true     # Supprime les pods/services si tu les effaces de ton Git
      selfHeal: true  # Annule toute modification faite à la main (via kubectl) pour forcer l'état du Git
    syncOptions:
      - CreateNamespace=true